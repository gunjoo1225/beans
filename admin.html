<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — 한국엘리스테이블</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">한국엘리스테이블</a>
    <nav class="nav">
      <a href="shop.html">Shop</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </header>

  <!-- 관리자 로그인 게이트 -->
  <div id="adminLoginGate" class="admin-login-gate">
    <div class="admin-login-box">
      <p class="admin-login-logo">한국엘리스테이블</p>
      <h2 class="admin-login-title">관리자 로그인</h2>
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input type="text" id="adminLoginId" class="form-input" placeholder="admin"
               onkeydown="if(event.key==='Enter') adminLogin()" />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="adminLoginPw" class="form-input" placeholder="비밀번호 입력"
               onkeydown="if(event.key==='Enter') adminLogin()" />
      </div>
      <p class="form-error" id="adminLoginError"></p>
      <button class="btn-submit" onclick="adminLogin()">로그인</button>
    </div>
  </div>

  <!-- 관리자 탭 -->
  <div class="admin-tab-bar">
    <button class="admin-tab active" id="tabProducts" onclick="switchAdminTab('products')">제품 관리</button>
    <button class="admin-tab" id="tabOrders" onclick="switchAdminTab('orders')">
      주문 이력 <span class="order-badge" id="orderBadge">0</span>
    </button>
    <button class="admin-tab" id="tabMembers" onclick="switchAdminTab('members')">
      회원 관리 <span class="order-badge" id="memberBadge" style="display:none">0</span>
    </button>
    <button class="admin-tab" id="tabSubs" onclick="switchAdminTab('subs')">구독 신청</button>
    <button class="admin-tab" id="tabPartners" onclick="switchAdminTab('partners')">파트너 상담</button>
    <button class="admin-tab" id="tabSettings" onclick="switchAdminTab('settings')">설정</button>
  </div>

  <!-- 제품 관리 패널 -->
  <div id="productsPanel">
  <div class="admin-layout">

    <!-- 왼쪽: 등록 폼 -->
    <aside class="form-panel">
      <div class="panel-header">
        <h2 class="panel-title" id="formTitle">제품 등록</h2>
        <button class="btn-reset" onclick="resetForm()">초기화</button>
      </div>

      <form id="productForm" onsubmit="handleSubmit(event)">
        <input type="hidden" id="editId" />

        <!-- 이미지 -->
        <div class="form-group">
          <label class="form-label">대표 이미지</label>
          <div class="image-upload-tabs">
            <button type="button" class="tab-btn active" onclick="switchImageTab(this, 'url')">URL 입력</button>
            <button type="button" class="tab-btn" onclick="switchImageTab(this, 'file')">파일 업로드</button>
          </div>
          <div id="tabUrl">
            <input type="text" id="imageUrl" class="form-input" placeholder="https://images.unsplash.com/..." oninput="previewImage()" />
          </div>
          <div id="tabFile" style="display:none">
            <label class="file-upload-label">
              <input type="file" id="imageFile" accept="image/*" onchange="handleFileUpload(event)" style="display:none" />
              <span id="fileLabel">클릭하여 이미지 선택</span>
            </label>
          </div>
          <div class="image-preview" id="imagePreview">
            <span>이미지를 추가하면 미리보기가 표시됩니다</span>
          </div>
        </div>

        <!-- 상품명 -->
        <div class="form-group">
          <label class="form-label">상품명 <span class="required">*</span></label>
          <input type="text" id="productName" class="form-input" placeholder="Ethiopia Yirgacheffe" required />
        </div>

        <!-- 국가 / 지역 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">국가 <span class="required">*</span></label>
            <input type="text" id="country" class="form-input" placeholder="Ethiopia" required />
          </div>
          <div class="form-group">
            <label class="form-label">지역 <span class="required">*</span></label>
            <input type="text" id="area" class="form-input" placeholder="Yirgacheffe" required />
          </div>
        </div>

        <!-- 로스팅 / 프로세스 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">로스팅 <span class="required">*</span></label>
            <select id="roast" class="form-select" required>
              <option value="">선택</option>
              <option value="light">Light</option>
              <option value="medium">Medium</option>
              <option value="dark">Dark</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">프로세스</label>
            <input type="text" id="process" class="form-input" placeholder="Washed" />
          </div>
        </div>

        <!-- 고도 / 뱃지 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">고도</label>
            <input type="text" id="altitude" class="form-input" placeholder="1,800–2,200m" />
          </div>
          <div class="form-group">
            <label class="form-label">뱃지</label>
            <select id="badge" class="form-select">
              <option value="">없음</option>
              <option value="New">New</option>
              <option value="Premium">Premium</option>
              <option value="Best">Best</option>
              <option value="Limited">Limited</option>
            </select>
          </div>
        </div>

        <!-- 가격 -->
        <div class="form-group">
          <label class="form-label">가격 (원) <span class="required">*</span></label>
          <div class="price-row">
            <div class="price-item">
              <span class="price-label">200g</span>
              <input type="number" id="price200" class="form-input" placeholder="18000" required />
            </div>
            <div class="price-item">
              <span class="price-label">500g</span>
              <input type="number" id="price500" class="form-input" placeholder="38000" required />
            </div>
            <div class="price-item">
              <span class="price-label">1kg</span>
              <input type="number" id="price1000" class="form-input" placeholder="68000" required />
            </div>
          </div>
        </div>

        <!-- 플레이버 태그 -->
        <div class="form-group">
          <label class="form-label">플레이버 노트 <span class="form-hint">(입력 후 Enter)</span></label>
          <div class="tag-input-wrap">
            <div class="tag-list" id="tagList"></div>
            <input type="text" id="tagInput" class="tag-input" placeholder="Jasmine" onkeydown="handleTagInput(event)" />
          </div>
        </div>

        <!-- 플레이버 차트 슬라이더 -->
        <div class="form-group">
          <label class="form-label">플레이버 차트 (0–10)</label>
          <div class="slider-group">
            <div class="slider-row">
              <span class="slider-label">FLORAL</span>
              <input type="range" id="sFloral" min="0" max="10" value="5" oninput="updateSlider(this,'vFloral')" />
              <span class="slider-value" id="vFloral">5</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">FRUITY</span>
              <input type="range" id="sFruity" min="0" max="10" value="5" oninput="updateSlider(this,'vFruity')" />
              <span class="slider-value" id="vFruity">5</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">SWEET</span>
              <input type="range" id="sSweet" min="0" max="10" value="5" oninput="updateSlider(this,'vSweet')" />
              <span class="slider-value" id="vSweet">5</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">ACIDITY</span>
              <input type="range" id="sAcidity" min="0" max="10" value="5" oninput="updateSlider(this,'vAcidity')" />
              <span class="slider-value" id="vAcidity">5</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">BODY</span>
              <input type="range" id="sBody" min="0" max="10" value="5" oninput="updateSlider(this,'vBody')" />
              <span class="slider-value" id="vBody">5</span>
            </div>
            <div class="slider-row">
              <span class="slider-label">ROAST</span>
              <input type="range" id="sRoast" min="0" max="10" value="5" oninput="updateSlider(this,'vRoast')" />
              <span class="slider-value" id="vRoast">5</span>
            </div>
          </div>
        </div>

        <!-- 제품 스토리 -->
        <div class="form-group">
          <label class="form-label">제품 스토리 <span class="form-hint">(산지·농장 소개, 2-3문장)</span></label>
          <textarea id="description" class="form-textarea" rows="3" placeholder="산지와 농장 이야기, 원두 특성을 2-3문장으로 소개해주세요."></textarea>
        </div>

        <!-- 추출 가이드 -->
        <div class="form-group">
          <label class="form-label">추출 가이드</label>
          <div class="brew-grid">
            <div class="brew-item">
              <span class="brew-item-label">물 온도</span>
              <input type="text" id="brewTemp" class="form-input" placeholder="90–93°C" />
            </div>
            <div class="brew-item">
              <span class="brew-item-label">원두:물 비율</span>
              <input type="text" id="brewRatio" class="form-input" placeholder="1:15" />
            </div>
            <div class="brew-item">
              <span class="brew-item-label">추출 시간</span>
              <input type="text" id="brewTime" class="form-input" placeholder="3분" />
            </div>
            <div class="brew-item">
              <span class="brew-item-label">추천 기구</span>
              <input type="text" id="brewEquip" class="form-input" placeholder="핸드드립, 에어로프레스" />
            </div>
          </div>
        </div>

        <!-- 재고 -->
        <div class="form-group">
          <label class="form-label">재고 상태</label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="stock" value="true" checked /> 재고 있음</label>
            <label class="radio-label"><input type="radio" name="stock" value="false" /> 품절</label>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">제품 등록</button>
      </form>
    </aside>

    <!-- 오른쪽: 등록된 제품 목록 -->
    <main class="list-panel">
      <div class="panel-header">
        <h2 class="panel-title">등록된 제품 <span class="product-count" id="productCount">0</span></h2>
        <a href="index.html" class="btn-view-shop" target="_blank">쇼핑몰 보기 →</a>
      </div>
      <div class="product-list" id="productList"></div>
    </main>

  </div>
  </div><!-- /productsPanel -->

  <!-- 주문 이력 패널 -->
  <div id="ordersPanel" style="display:none">
    <div class="orders-layout">
      <div class="orders-toolbar">
        <div class="orders-filter">
          <button class="filter-tab active" onclick="filterOrders(this,'all')">전체</button>
          <button class="filter-tab" onclick="filterOrders(this,'주문완료')">주문완료</button>
          <button class="filter-tab" onclick="filterOrders(this,'배송준비중')">배송준비중</button>
          <button class="filter-tab" onclick="filterOrders(this,'배송중')">배송중</button>
          <button class="filter-tab" onclick="filterOrders(this,'배송완료')">배송완료</button>
        </div>
        <span class="orders-total-label">총 <strong id="ordersTotalCount">0</strong>건</span>
      </div>
      <div id="orderList"></div>
    </div>
  </div>

  <!-- 구독 신청 패널 -->
  <div id="subsPanel" style="display:none">
    <div class="orders-layout">
      <div class="orders-toolbar">
        <span class="panel-title">구독 신청 목록</span>
        <span class="orders-total-label">총 <strong id="subsTotalCount">0</strong>건</span>
      </div>
      <div id="subsList"></div>
    </div>
  </div>

  <!-- 파트너 상담 패널 -->
  <div id="partnersPanel" style="display:none">
    <div class="orders-layout">
      <div class="orders-toolbar">
        <span class="panel-title">파트너 상담 신청 목록</span>
        <span class="orders-total-label">총 <strong id="partnersTotalCount">0</strong>건</span>
      </div>
      <div id="partnersList"></div>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div id="settingsPanel" style="display:none">
    <div class="orders-layout">
      <div class="panel-header" style="margin-bottom:28px">
        <h2 class="panel-title">관리자 설정</h2>
        <button class="btn-reset" onclick="adminLogout()">로그아웃</button>
      </div>

      <div class="settings-block">
        <h3 class="settings-block-title">등록된 관리자 계정</h3>
        <div id="adminAccountList"></div>
      </div>

      <div class="settings-block">
        <h3 class="settings-block-title">새 관리자 추가</h3>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">아이디</label>
            <input type="text" id="newAdminId" class="form-input" placeholder="아이디" />
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input type="password" id="newAdminPw" class="form-input" placeholder="비밀번호" />
          </div>
        </div>
        <p class="form-error" id="adminAddError"></p>
        <button class="btn-submit" style="width:auto;padding:10px 28px;margin-top:4px" onclick="addAdminAccount()">추가</button>
      </div>
    </div>
  </div>

  <!-- 회원 관리 패널 -->
  <div id="membersPanel" style="display:none">
    <div class="members-layout">

      <!-- 왼쪽: 회원 목록 -->
      <div class="members-list-panel">
        <div class="panel-header" style="padding:20px 24px 16px;">
          <h2 class="panel-title">가입 회원 <span class="product-count" id="memberCount">0</span></h2>
        </div>
        <div id="memberList"></div>
      </div>

      <!-- 오른쪽: 선택 회원 주문이력 -->
      <div class="member-detail-panel" id="memberDetailPanel">
        <div class="member-detail-empty">
          <p>왼쪽에서 회원을 선택하면<br>주문 이력이 표시됩니다.</p>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/admin.js"></script>
</body>
</html>
