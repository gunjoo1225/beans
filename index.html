<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국엘리스테이블 — 원두 커피</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/shop.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="logo">한국엘리스테이블</a>
    <nav class="nav">
      <a href="index.html" class="active">Shop</a>
      <a href="about.html">About</a>
      <a href="subscription.html">Subscription</a>
    </nav>
    <div class="header-right" id="headerAuthArea"></div>
  </header>

  <!-- PAGE TITLE -->
  <div class="page-title-wrap">
    <p class="page-category">Single Origin</p>
    <h1 class="page-title">원두 컬렉션</h1>
    <p class="page-desc">산지에서 직접 선별한 스페셜티 원두를 만나보세요.</p>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProducts(this, 'all')">All</button>
    <button class="filter-btn" onclick="filterProducts(this, 'light')">Light</button>
    <button class="filter-btn" onclick="filterProducts(this, 'medium')">Medium</button>
    <button class="filter-btn" onclick="filterProducts(this, 'dark')">Dark</button>
  </div>

  <!-- PRODUCT GRID -->
  <main class="shop-grid" id="shopGrid"></main>

  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/shop.js"></script>

  <footer class="site-footer">
    <div class="footer-info">
      <p class="footer-brand">한국엘리스테이블 · 허니버스트</p>
      <p class="footer-copy">국내 1세대 로스터리 café namoo에서 시작, 18년 경력의 원두 전문 브랜드 · 전국 40여개 카페 납품</p>
      <p class="footer-copy">© 2025 한국엘리스테이블. All rights reserved.</p>
    </div>
    <a href="admin-test.html" class="footer-admin-link">관리자</a>
  </footer>

</html>
