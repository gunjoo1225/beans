<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 — 한국엘리스테이블</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/cart.css" />
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">한국엘리스테이블</a>
    <nav class="nav">
      <a href="shop.html">Shop</a>
      <a href="#">About</a>
      <a href="#">Subscription</a>
    </nav>
    <a href="cart.html" class="cart-icon" id="cartBadge">Cart (0)</a>
  </header>

  <div class="breadcrumb">
    <a href="shop.html">Shop</a>
    <span>/</span>
    <span>장바구니</span>
  </div>

  <!-- 장바구니 비었을 때 -->
  <div class="cart-empty" id="cartEmpty" style="display:none">
    <p class="cart-empty-icon">☕</p>
    <p class="cart-empty-title">장바구니가 비어있습니다</p>
    <p class="cart-empty-desc">마음에 드는 원두를 담아보세요.</p>
    <a href="shop.html" class="btn-go-shop">쇼핑하러 가기</a>
  </div>

  <!-- 장바구니 본문 -->
  <main class="cart-layout" id="cartLayout">

    <section class="cart-items-section">
      <div class="cart-section-header">
        <h2 class="cart-title">장바구니</h2>
        <button class="btn-clear-cart" onclick="clearCart()">전체 삭제</button>
      </div>
      <div id="cartList"></div>
    </section>

    <aside class="cart-summary">
      <h2 class="block-title">주문 요약</h2>
      <div class="cart-summary-rows">
        <div class="cart-summary-row">
          <span>상품 금액</span>
          <span id="cartSubtotal">—</span>
        </div>
        <div class="cart-summary-row">
          <span>배송비</span>
          <span id="cartShipping">—</span>
        </div>
        <div class="cart-summary-total">
          <span>최종 결제 금액</span>
          <span id="cartTotal">—</span>
        </div>
      </div>
      <p class="cart-shipping-notice" id="cartShippingNotice"></p>
      <button class="btn-checkout" onclick="proceedToCheckout()">주문하기</button>
      <a href="shop.html" class="btn-continue-shopping">쇼핑 계속하기</a>
    </aside>

  </main>

  <script src="js/cart.js"></script>
</body>
</html>
