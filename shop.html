<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — 한국엘리스테이블</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/shop.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="logo">한국엘리스테이블</a>
    <nav class="nav">
      <a href="shop.html" class="active">Shop</a>
      <a href="#">About</a>
      <a href="#">Subscription</a>
    </nav>
    <a href="cart.html" class="cart-icon" id="cartBadge">Cart (0)</a>
  </header>

  <!-- PAGE TITLE -->
  <div class="page-title-wrap">
    <p class="page-category">Single Origin</p>
    <h1 class="page-title">원두 컬렉션</h1>
    <p class="page-desc">산지에서 직접 선별한 스페셜티 원두를 만나보세요.</p>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProducts(this, 'all')">All</button>
    <button class="filter-btn" onclick="filterProducts(this, 'light')">Light</button>
    <button class="filter-btn" onclick="filterProducts(this, 'medium')">Medium</button>
    <button class="filter-btn" onclick="filterProducts(this, 'dark')">Dark</button>
  </div>

  <!-- PRODUCT GRID -->
  <main class="shop-grid" id="shopGrid"></main>

  <script src="js/cart.js"></script>
  <script src="js/shop.js"></script>

  <footer class="site-footer">
    <p class="footer-copy">© 2026 한국엘리스테이블. All rights reserved.</p>
    <a href="admin.html" class="footer-admin-link">관리자</a>
  </footer>

</body>
</html>
